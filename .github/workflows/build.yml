name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Style check ───────────────────────────────────────────────────────────
  style:
    name: style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run style checker
        run: |
          find src tests tools examples -name '*.cs' -print0 \
            | xargs -0 python3 tools/check_style.py

  # ── API docs freshness check ──────────────────────────────────────────────
  docs:
    name: docs-up-to-date
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate API docs
        run: python3 tools/gen_api_docs.py

      - name: Verify docs/api/ matches committed state
        run: |
          if ! git diff --exit-code -- docs/api/; then
            echo "::error::docs/api/ is stale. Run 'python3 tools/gen_api_docs.py' and commit the result."
            exit 1
          fi

  # ── Build and test matrix ─────────────────────────────────────────────────
  build:
    name: build-${{ matrix.os }}
    needs: style
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Chuvadi.slnx

      - name: Build
        run: dotnet build Chuvadi.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Chuvadi.slnx --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: '**/test-results.trx'
          if-no-files-found: ignore
